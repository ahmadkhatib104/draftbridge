# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "01577859d7f63cc66f4f953ea240f48b"
name = "DraftBridge"
application_url = "https://draftbridge.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app/subscriptions_update"

  [[webhooks.subscriptions]]
  topics = [ "draft_orders/delete" ]
  uri = "/webhooks/draft_orders/delete"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/compliance"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,read_customers,write_draft_orders"

[auth]
redirect_urls = [
  "https://draftbridge.onrender.com/auth/callback",
  "https://draftbridge.onrender.com/auth/shopify/callback",
]
