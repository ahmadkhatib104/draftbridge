services:
  - type: web
    name: draftbridge
    runtime: docker
    plan: free
    region: virginia
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_BILLING_TEST_MODE
        value: "true"
      - key: SCOPES
        value: read_products,read_customers,write_draft_orders
      - key: SHOPIFY_APP_HANDLE
        value: draftbridge
      - key: DATABASE_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: OPENAI_PRIMARY_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_OCR_MODEL
        value: gpt-5.4
      - key: OPENAI_RETRY_MODEL
        value: gpt-5.4
      - key: OPENAI_API_KEY
        sync: false
      - key: EMAIL_ROUTING_DOMAIN
        sync: false
      - key: EMAIL_INGEST_SHARED_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: OPS_DASHBOARD_TOKEN
        sync: false
